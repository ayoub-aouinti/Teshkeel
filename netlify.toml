[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions.tashkeel]
  timeout = 26

# /api/tashkeel  →  Netlify serverless function (production)
[[redirects]]
  from   = "/api/tashkeel"
  to     = "/.netlify/functions/tashkeel"
  status = 200
  force  = true

# SPA fallback — every other route serves index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
